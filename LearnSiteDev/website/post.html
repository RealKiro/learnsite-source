<html xmlns="http://www.w3.org/1999/xhtml">
<head >
    <title>提交结果</title>
</head>
<body>
    <div>
    <h1>你提交的结果是：</h1>
    你的姓名：<span id="username"></span>
    <br />
    <br />
    你最喜欢的学科：<span id="content"></span>
    </div>
</body>
<script>
	const urlParams = new URLSearchParams(window.location.search);
	const uname = urlParams.get('username');
	const ucnt = urlParams.get('content');
	document.getElementById("username").innerHTML=uname;
	document.getElementById("content").innerHTML=ucnt;
	
</script>
</html>
